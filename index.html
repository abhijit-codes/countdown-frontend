<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Countdown Timer</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 20px;
    }

    .inputs input {
      width: 60px;
      padding: 10px;
      margin: 5px;
      font-size: 18px;
      text-align: center;
    }

    .display {
      font-size: 40px;
      margin: 20px 0;
      font-weight: bold;
    }

    .buttons button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .buttons button:hover {
      background: #007bff;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Countdown Timer</h1>

    <div class="inputs">
      <input type="number" id="hours" placeholder="HH" min="0">
      <input type="number" id="minutes" placeholder="MM" min="0" max="59">
      <input type="number" id="seconds" placeholder="SS" min="0" max="59">
    </div>

    <div class="display" id="display">
      00:00:00
    </div>

    <div class="buttons">
      <button onclick="startTimer()">Start</button>
      <button onclick="pauseTimer()">Pause</button>
      <button onclick="resetTimer()">Reset</button>
    </div>
  </div>

  <script>
    let timer;
    let totalSeconds = 0;

    function updateDisplay() {
      let hrs = Math.floor(totalSeconds / 3600);
      let mins = Math.floor((totalSeconds % 3600) / 60);
      let secs = totalSeconds % 60;

      document.getElementById("display").innerText =
        String(hrs).padStart(2, '0') + ":" +
        String(mins).padStart(2, '0') + ":" +
        String(secs).padStart(2, '0');
    }

    function startTimer() {
      if (timer) return;

      let hrs = parseInt(document.getElementById("hours").value) || 0;
      let mins = parseInt(document.getElementById("minutes").value) || 0;
      let secs = parseInt(document.getElementById("seconds").value) || 0;

      if (totalSeconds === 0) {
        totalSeconds = hrs * 3600 + mins * 60 + secs;
      }

      timer = setInterval(() => {
        if (totalSeconds > 0) {
          totalSeconds--;
          updateDisplay();
        } else {
          clearInterval(timer);
          timer = null;
          alert("Time's up!");
        }
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(timer);
      timer = null;
    }

    function resetTimer() {
      clearInterval(timer);
      timer = null;
      totalSeconds = 0;
      updateDisplay();

      document.getElementById("hours").value = "";
      document.getElementById("minutes").value = "";
      document.getElementById("seconds").value = "";
    }
  </script>

</body>
</html>
